<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="/code/styles.css" />
  <title>Matrix</title>
</head>

<body>
  <nav id="navPlaceholder"></nav>
  <main id="mainContent"></main>
  <footer id="footerPlaceholder"></footer>

  <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init({ publicKey: "zjNMLo6UJA4DbYfID" });

    $(function () {
      $("#navPlaceholder").load("/code/html/components/navbar.html");
      $("#footerPlaceholder").load("/code/html/components/footer.html");

      function loadContent() {
        let page = sessionStorage.id || "recipes";
        $("#mainContent").load(`/code/html/pages/${page}.html`, function () {
          loadPageScript(page);
        });
      }

      loadContent();

      $(document).on("click", ".nava", function (e) {
        e.preventDefault();
        sessionStorage.id = $(this).data("page");
        loadContent();
      });

      function loadPageScript(page) {
        const oldScript = document.getElementById("pageScript");
        if (oldScript) oldScript.remove();

        const script = document.createElement("script");
        script.id = "pageScript";
        script.src = `/code/js/${page}.js?v=${Date.now()}`;
        document.body.appendChild(script);
      }
    });
  </script>
</body>
</html>
